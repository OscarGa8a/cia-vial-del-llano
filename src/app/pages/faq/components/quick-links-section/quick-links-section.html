<section class="py-12 md:py-20 bg-white" aria-labelledby="quick-links-heading">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
    <h2
      id="quick-links-heading"
      class="font-sans font-bold text-2xl text-text-primary text-center mb-10"
    >
      También te puede interesar
    </h2>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
      @for (link of quickLinks; track link.href) {
        <a
          [routerLink]="link.href"
          class="card-hover group flex flex-col items-center gap-3 p-6 rounded-2xl border border-border bg-white text-center"
          [attr.aria-label]="link.ariaLabel"
        >
          <div
            class="w-12 h-12 rounded-xl flex items-center justify-center transition-colors"
            [class]="link.classes"
          >
            <app-icon [lucideIcon]="link.icon" [size]="22" />
          </div>
          <h3
            class="font-semibold text-text-primary text-sm group-hover:text-primary transition-colors"
          >
            {{ link.label }}
          </h3>
          <p class="text-xs text-text-secondary leading-relaxed">
            {{ link.description }}
          </p>
        </a>
      }
    </div>
  </div>
</section>
