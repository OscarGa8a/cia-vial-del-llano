<section class="hero-gradient py-28" aria-labelledby="faq-hero-heading">
  <div class="absolute inset-0 overflow-hidden w-full h-full">
    <img
      ngSrc="banner_faq_wkiyuk"
      fill
      priority
      class="w-full h-full object-cover opacity-30 object-bottom"
      alt="Banner de la calculadora"
    />
  </div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <!-- Breadcrumb -->
    <nav aria-label="Breadcrumb" class="flex items-center gap-2 text-sm text-white/60 mb-6">
      <a routerLink="/" class="hover:text-white transition-colors">Inicio</a>
      <span aria-hidden="true">/</span>
      <span class="text-highlight font-semibold">Preguntas Frecuentes</span>
    </nav>

    <!-- Content -->
    <div class="text-center pb-16">
      <!-- Icon -->
      <div
        class="w-20 h-20 mx-auto rounded-full bg-white/10 border-2 border-white/20 flex items-center justify-center mb-6"
        aria-hidden="true"
      >
        <app-icon [lucideIcon]="CircleQuestionIcon" [size]="36" class="text-white" />
      </div>

      <!-- Heading -->
      <h1
        id="faq-hero-heading"
        class="font-sans font-bold text-3xl sm:text-4xl lg:text-5xl text-white mb-4 leading-tight"
      >
        Preguntas
        <span class="text-highlight">Frecuentes</span>
      </h1>

      <p class="text-white/80 text-lg sm:text-xl max-w-2xl mx-auto leading-relaxed">
        Encuentra respuestas a las dudas más comunes sobre comparendos, cursos pedagógicos,
        descuentos, pagos y certificados.
      </p>
    </div>
  </div>

  <!-- Wave divider -->
  <div class="absolute bottom-0 w-full h-20 overflow-hidden">
    <svg
      class="w-full h-full"
      viewBox="0 0 1440 64"
      preserveAspectRatio="none"
      fill="white"
      aria-hidden="true"
    >
      <path d="M0,32 C360,64 1080,0 1440,32 L1440,64 L0,64 Z" />
    </svg>
  </div>
</section>
