<section class="py-8 bg-white">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="max-w-4xl mx-auto">
      <div
        class="bg-linear-to-r from-success/10 to-success/5 border border-success/20 rounded-2xl p-6 lg:p-8"
      >
        <div class="flex flex-col md:flex-row items-center gap-6">
          <div
            class="w-16 h-16 bg-success/20 rounded-2xl flex items-center justify-center shrink-0 text-success"
          >
            <app-icon [lucideIcon]="CircleParkingIcon" [size]="32" />
          </div>
          <div class="grow text-center md:text-left">
            <h3 class="font-sans font-bold text-xl text-text-primary mb-2">Parqueadero Gratuito</h3>
            <p class="text-text-secondary">
              Contamos con parqueadero privado <strong>sin costo adicional</strong> para nuestros
              clientes. Capacidad para carros y motos. Si está lleno, hay parqueaderos públicos a
              menos de 50 metros.
            </p>
          </div>
          <div class="shrink-0">
            <span
              class="inline-flex items-center gap-2 bg-success text-white font-bold px-4 py-2 rounded-full"
            >
              <app-icon [lucideIcon]="CheckIcon" [size]="16" />
              Gratis
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
