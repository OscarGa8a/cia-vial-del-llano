<section
  class="py-12 md:py-20 bg-linear-to-br from-primary via-primary-dark to-accent relative overflow-hidden"
  aria-labelledby="contact-final-cta-heading"
>
  <div class="relative max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
    <!-- Icon -->
    <div
      class="w-20 h-20 mx-auto rounded-full bg-white/10 border-2 border-white/20 flex items-center justify-center mb-8"
      aria-hidden="true"
    >
      <app-icon [lucideIcon]="ShieldIcon" [size]="36" class="text-white" aria-hidden="true" />
    </div>

    <h2
      id="contact-final-cta-heading"
      class="font-sans font-bold text-3xl sm:text-4xl lg:text-5xl text-white mb-6 leading-tight"
    >
      ¿Aún tienes <span class="text-highlight">dudas</span>?
    </h2>

    <p class="text-white/80 text-lg sm:text-xl mb-10 max-w-2xl mx-auto leading-relaxed">
      Nuestro equipo está listo para ayudarte. Escríbenos por WhatsApp y te responderemos en
      minutos.
    </p>

    <!-- CTA button -->
    <a
      [href]="whatsappLink()"
      target="_blank"
      rel="noopener noreferrer"
      class="inline-flex items-center gap-3 px-10 py-5 rounded-full bg-whatsapp hover:bg-whatsapp-hover text-white font-bold text-lg lg:text-xl transition-all hover:scale-105 active:scale-95 shadow-2xl animate-whatsapp-pulse"
      aria-label="Escribir por WhatsApp para resolver dudas"
    >
      <app-icon source="custom" name="whatsapp-custom" [size]="28" />
      Escribir por WhatsApp
    </a>

    <!-- Response indicator -->
    <p class="mt-5 text-white/60 text-sm flex items-center justify-center gap-2">
      <span
        class="w-2 h-2 rounded-full bg-whatsapp animate-ping inline-block"
        aria-hidden="true"
      ></span>
      Respuesta en menos de 5 minutos
    </p>
  </div>
</section>
