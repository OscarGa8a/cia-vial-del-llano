@let localTestimonial = testimonial();
<article
  class="card-hover bg-white w-full h-full rounded-3xl p-8 shadow-sm border border-border flex flex-col"
  [attr.aria-label]="'Testimonio de ' + localTestimonial.name"
>
  <!-- Customer -->
  <div class="flex items-center gap-3 mb-3">
    <div
      class="w-11 h-11 rounded-full flex items-center justify-center text-white font-sans font-bold text-sm shrink-0"
      [class]="localTestimonial.avatarColor"
      [attr.aria-label]="localTestimonial.name"
    >
      {{ localTestimonial.initials }}
    </div>
    <div>
      <p class="font-semibold text-text-primary text-sm">{{ localTestimonial.name }}</p>
      <p class="text-text-secondary text-xs">
        {{ localTestimonial.role }} · {{ localTestimonial.location }}
      </p>
    </div>
  </div>

  <!-- Stars -->
  <div class="flex gap-1 mb-5" [attr.aria-label]="localTestimonial.rating + ' de 5 estrellas'">
    @for (star of getStars(localTestimonial.rating); track $index) {
      <svg
        width="18"
        height="18"
        viewBox="0 0 24 24"
        [attr.fill]="star ? '#F5A623' : 'none'"
        stroke="#F5A623"
        stroke-width="1.5"
        aria-hidden="true"
      >
        <polygon
          points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
        />
      </svg>
    }
  </div>

  <!-- Quote -->
  <blockquote class="text-text-secondary text-sm leading-relaxed flex-1 mb-6">
    "{{ localTestimonial.quote }}"
  </blockquote>
</article>
