@let localDiscount = infoDiscount();
<article
  class="card-hover rounded-3xl overflow-hidden shadow-lg border border-border h-full"
  [attr.aria-label]="localDiscount.title"
>
  <!-- Card header -->
  <div class="px-8 py-7" [class]="localDiscount.gradientClass">
    <div class="flex items-center gap-3 mb-1">
      <app-icon class="text-white" [lucideIcon]="localDiscount.icon" [size]="30" />
      <div>
        <h3 class="font-sans font-bold text-xl text-white">{{ localDiscount.title }}</h3>
        <p class="text-white/70 text-sm">{{ localDiscount.subtitle }}</p>
      </div>
    </div>
  </div>

  <!-- Discount tiers -->
  <div class="bg-white p-8">
    <div class="flex flex-col gap-4 mb-8">
      @for (tier of localDiscount.tiers; track tier.percent) {
        <div
          class="flex items-center justify-between p-4 rounded-2xl bg-gray-50 border border-border"
        >
          <div>
            <p class="text-sm font-medium text-text-secondary">{{ tier.label }}</p>
            <p class="text-xs text-text-secondary mt-0.5">{{ tier.days }}</p>
          </div>
          <div
            class="text-3xl font-sans font-bold px-3 py-1 rounded-xl"
            [class]="tier.colorClass"
            [attr.aria-label]="tier.percent + ' por ciento de descuento'"
          >
            {{ tier.percent }}%
          </div>
        </div>
      }
    </div>

    <button
      (click)="openWhatsapp()"
      class="flex items-center justify-center gap-2 w-full py-3.5 rounded-2xl bg-whatsapp hover:bg-whatsapp-hover cursor-pointer text-white font-semibold transition-all hover:scale-[1.02] active:scale-[0.98]"
      [attr.aria-label]="'Quiero el descuento para ' + localDiscount.title"
    >
      <app-icon source="custom" name="whatsapp-custom" [size]="20" />
      Quiero este descuento
    </button>
  </div>
</article>
