<section class="py-12 md:py-20 bg-gray-50" aria-labelledby="about-mvv-heading">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
    <!-- Section header -->
    <div class="text-center max-w-3xl mx-auto mb-12">
      <span
        class="inline-block bg-accent/10 text-accent font-semibold text-sm px-4 py-2 rounded-full mb-4"
      >
        LO QUE NOS DEFINE
      </span>
      <h2 id="about-mvv-heading" class="font-sans font-bold text-3xl md:text-4xl text-gray-900">
        Misión y Visión
      </h2>
    </div>

    <!-- Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <!-- Mission -->
      <div
        class="flex flex-col items-center bg-white rounded-2xl p-8 size-full shadow-lg border-t-4 border-primary card-hover"
      >
        <div
          class="w-14 h-14 bg-primary/10 rounded-2xl flex items-center justify-center mb-6"
          aria-hidden="true"
        >
          <app-icon [lucideIcon]="BowArrowIcon" [size]="28" class="text-primary shrink-0" />
        </div>
        <h3 class="font-sans font-bold text-xl text-gray-900 mb-4">Misión</h3>
        <p class="text-gray-600">
          {{ company.MISSION }}
        </p>
      </div>

      <!-- Vision -->
      <div
        class="flex flex-col items-center bg-white rounded-2xl p-8 size-full shadow-lg border-t-4 border-highlight card-hover"
      >
        <div
          class="w-14 h-14 bg-highlight/10 rounded-2xl flex items-center justify-center mb-6"
          aria-hidden="true"
        >
          <app-icon [lucideIcon]="EyeIcon" [size]="28" class="text-highlight shrink-0" />
        </div>
        <h3 class="font-sans font-bold text-xl text-gray-900 mb-4">Visión</h3>
        <p class="text-gray-600">
          {{ company.VISSION }}
        </p>
      </div>
    </div>
  </div>
</section>
