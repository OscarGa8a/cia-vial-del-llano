<section class="py-12 md:py-20 bg-gray-50" aria-labelledby="about-facilities-heading">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <!-- Section header -->
    <div class="text-center max-w-3xl mx-auto mb-12">
      <span
        class="inline-block bg-accent/10 text-accent font-semibold text-sm px-4 py-2 rounded-full mb-4"
      >
        NUESTRO ESPACIO
      </span>
      <h2
        id="about-facilities-heading"
        class="font-sans font-bold text-3xl md:text-4xl text-gray-900 mb-4"
      >
        Conoce nuestras
        <span class="text-primary">instalaciones</span>
      </h2>
    </div>

    <!-- Bento grid -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 auto-rows-[280px]">
      @for (facility of facilities; track facility.name) {
        <div
          class="facility relative rounded-2xl overflow-hidden group cursor-pointer"
          [class]="facility.colSpan2 ? 'col-span-2' : ''"
          [attr.aria-label]="facility.name"
        >
          <div class="w-full h-full relative">
            <img
              [ngSrc]="facility.image"
              [alt]="facility.name"
              fill
              class="w-full h-full object-cover"
            />
          </div>

          <!-- Label -->
          <div class="absolute bottom-0 left-0 right-0 ps-4 p-2 text-white bg-black/40">
            <h4 class="font-bold text-lg">{{ facility.name }}</h4>
            @if (facility.subtitle) {
              <p class="text-sm text-white/80">
                {{ facility.subtitle }}
              </p>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
