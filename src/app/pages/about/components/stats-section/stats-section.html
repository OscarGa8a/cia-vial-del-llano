<section
  class="py-12 md:py-20 bg-linear-to-r from-primary to-primary-dark relative overflow-hidden"
  aria-label="Estadísticas de CIA Vial del Llano"
>
  <div class="relative z-10 max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-8">
      @for (stat of stats; track stat.label) {
        <div class="text-center">
          <p
            class="font-sans font-bold text-4xl md:text-5xl lg:text-6xl mb-2"
            [class]="stat.highlight ? 'text-highlight' : 'text-white'"
          >
            {{ stat.value }}
          </p>
          <p class="text-white/80 text-base lg:text-lg">
            {{ stat.label }}
          </p>
        </div>
      }
    </div>
  </div>
</section>
