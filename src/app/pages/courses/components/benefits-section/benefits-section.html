<section class="py-12 md:py-20 bg-surface-alt" aria-labelledby="benefits-heading">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <!-- Section header -->
    <div class="text-center mb-14">
      <span
        class="inline-block bg-success-light text-success text-xs font-bold uppercase tracking-widest px-4 py-1.5 rounded-full mb-4"
      >
        Beneficios
      </span>
      <h2
        id="benefits-heading"
        class="font-sans font-bold text-3xl sm:text-4xl text-text-primary mb-4"
      >
        ¿Por qué tomar el curso con nosotros?
      </h2>
      <p class="text-text-secondary text-lg max-w-2xl mx-auto">
        Te ofrecemos la mejor experiencia para que obtengas tu descuento de manera rápida y cómoda.
      </p>
    </div>

    <!-- Benefits grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (benefit of benefits; track benefit.title) {
        <article
          class="card-hover bg-white rounded-2xl border border-border p-7 shadow-sm text-center flex flex-col items-center"
        >
          <!-- Icon -->
          <div
            class="w-14 h-14 rounded-2xl flex items-center justify-center mb-5"
            [class]="benefit.classes"
            aria-hidden="true"
          >
            <app-icon [lucideIcon]="benefit.icon" [size]="20" />
          </div>

          <!-- Content -->
          <h3 class="font-sans font-bold text-lg text-text-primary mb-2">
            {{ benefit.title }}
          </h3>
          <p class="text-text-secondary text-sm leading-relaxed">
            {{ benefit.description }}
          </p>
        </article>
      }
    </div>
  </div>
</section>
