<section
  class="py-20 text-white text-center bg-linear-to-br from-primary via-primary-dark to-accent relative overflow-hidden"
  aria-labelledby="calc-cta-heading"
>
  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
    <h2 id="calc-cta-heading" class="font-sans font-bold text-3xl sm:text-4xl md:text-5xl mb-6">
      ¿Ya calculaste tu multa?
    </h2>
    <p class="text-white/90 text-lg sm:text-xl mb-8">
      Contáctanos ahora para agendar tu curso. Recuerda que los plazos corren y cada día hábil
      cuenta.
    </p>

    <a
      [href]="whatsappLink()"
      target="_blank"
      rel="noopener noreferrer"
      class="inline-flex items-center justify-center gap-3 bg-whatsapp hover:bg-whatsapp-hover text-white font-bold px-10 py-5 rounded-full transition-all duration-300 hover:scale-105 shadow-2xl text-lg whatsapp-glow"
      aria-label="Agendar curso vía WhatsApp"
    >
      <app-icon source="custom" name="whatsapp-custom" [size]="24" />
      Agendar vía WhatsApp
    </a>

    <!-- Trust badges -->
    <div
      class="mt-8 flex flex-wrap justify-center gap-6 text-sm text-white/80"
      aria-label="Certificaciones y estadísticas"
    >
      @for (badge of badges; track badge) {
        <span class="flex items-center gap-1.5">
          <app-icon [lucideIcon]="CircleCheckIcon" [size]="14" />
          {{ badge }}
        </span>
      }
    </div>
  </div>
</section>
